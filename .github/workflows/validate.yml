name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun run validate
      - run: bun run build:dist
      - run: bun run build:dist:check
      - run: bun run smoke
      - run: bun run eval:check
      - run: ./scripts/install.sh --mode local --target /tmp/sts-install --harness all --dry-run --skip-external-deps
      - run: bun run install:smoke
